name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.buildnum.outputs.tag }}
      name: ${{ steps.buildnum.outputs.name }}
      is_release: ${{ steps.buildnum.outputs.is_release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get release info
        id: buildnum
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [[ "$COMMIT_MSG" == \[release\]* ]]; then
            VERSION="${COMMIT_MSG#\[release\] }"
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
            echo "name=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list --count HEAD)
            echo "tag=build-$COUNT" >> $GITHUB_OUTPUT
            echo "name=Build $COUNT" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release body
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [[ "$COMMIT_MSG" == \[release\]* ]]; then
            LAST_RELEASE=$(git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            printf "## Changes\n" > release_body.md
            if [ -n "$LAST_RELEASE" ]; then
              git log "${LAST_RELEASE}..HEAD~1" --abbrev=8 --pretty=format:"- %s by @%an in %h" | sed 's/@Xavier Perri/@XDPXI/g' | grep -v '^- Merge' >> release_body.md
            else
              git log "HEAD~1" --abbrev=8 --pretty=format:"- %s by @%an in %h" | sed 's/@Xavier Perri/@XDPXI/g' | grep -v '^- Merge' >> release_body.md
            fi
          else
            git log -1 --pretty=%s > release_body.md
          fi

      - name: Create build prerelease
        if: steps.buildnum.outputs.is_release == 'false'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.buildnum.outputs.name }}
          tag_name: ${{ steps.buildnum.outputs.tag }}
          prerelease: true
          body_path: release_body.md

      - name: Create version release
        if: steps.buildnum.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.buildnum.outputs.name }}
          tag_name: ${{ steps.buildnum.outputs.tag }}
          prerelease: false
          body_path: release_body.md

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app (Linux)
        run: bun tauri build

      - name: Rename Linux artifacts
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          cp "$DEB" "xds-code_${VERSION}_linux-amd64.deb"
          RPM=$(find src-tauri/target/release/bundle/rpm -name "*.rpm" | head -1)
          cp "$RPM" "xds-code_${VERSION}_linux-amd64.rpm"
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$APPIMAGE" "xds-code_${VERSION}_linux-amd64.AppImage"

      - name: Upload Linux artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            xds-code_*_linux-amd64.deb
            xds-code_*_linux-amd64.rpm
            xds-code_*_linux-amd64.AppImage

  build-windows:
    needs: create-release
    if: startsWith(github.event.head_commit.message, '[release]')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app (Windows)
        run: bun tauri build

      - name: Rename and package Windows artifacts
        shell: pwsh
        run: |
          $VERSION = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $MSI = (Get-ChildItem src-tauri/target/release/bundle/msi/*.msi)[0]
          Copy-Item $MSI.FullName "xds-code_${VERSION}_windows-x64-msi.msi"
          $NSIS = (Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe)[0]
          Copy-Item $NSIS.FullName "xds-code_${VERSION}_windows-x64-nsis.exe"
          Compress-Archive -Path src-tauri/target/release/xds-code.exe -DestinationPath "xds-code_${VERSION}_windows-x64-portable.zip"

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            xds-code_*_windows-x64-msi.msi
            xds-code_*_windows-x64-nsis.exe
            xds-code_*_windows-x64-portable.zip

  build-macos-intel:
    needs: create-release
    if: startsWith(github.event.head_commit.message, '[release]')
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-x86_64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-x86_64-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: bun install

      - name: Add Rust target for Intel macOS
        run: rustup target add x86_64-apple-darwin

      - name: Build Tauri app for macOS Intel (x86_64)
        run: bun tauri build --target x86_64-apple-darwin

      - name: Rename macOS Intel artifacts
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG" "xds-code_${VERSION}_macos-x64.dmg"

      - name: Upload macOS Intel artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            xds-code_*_macos-x64.dmg

  build-macos-arm:
    needs: create-release
    if: startsWith(github.event.head_commit.message, '[release]')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-aarch64-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: bun install

      - name: Add Rust target for Apple Silicon macOS
        run: rustup target add aarch64-apple-darwin

      - name: Build Tauri app for macOS Apple Silicon (arm64)
        run: bun tauri build

      - name: Rename macOS ARM artifacts
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          cp "$DMG" "xds-code_${VERSION}_macos-aarch64.dmg"

      - name: Upload macOS ARM artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            xds-code_*_macos-aarch64.dmg
