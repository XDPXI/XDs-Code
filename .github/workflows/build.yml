name: Build

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.buildnum.outputs.tag }}
      name: ${{ steps.buildnum.outputs.name }}
      is_release: ${{ steps.buildnum.outputs.is_release }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get release info
        id: buildnum
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [[ "$COMMIT_MSG" == \[release\]* ]]; then
            VERSION="${COMMIT_MSG#\[release\] }"
            echo "tag=$VERSION" >> $GITHUB_OUTPUT
            echo "name=$VERSION" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            COUNT=$(git rev-list --count HEAD)
            echo "tag=build-$COUNT" >> $GITHUB_OUTPUT
            echo "name=Build $COUNT" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate release body
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          if [[ "$COMMIT_MSG" == \[release\]* ]]; then
            LAST_RELEASE=$(git tag --list | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
            printf "## Changes\n" > release_body.md
            if [ -n "$LAST_RELEASE" ]; then
              git log "${LAST_RELEASE}..HEAD~1" --abbrev=8 --pretty=format:"- %s by @%an in %h" | sed 's/@Xavier Perri/@XDPXI/g' | grep -v '^- Merge' >> release_body.md
            else
              git log "HEAD~1" --abbrev=8 --pretty=format:"- %s by @%an in %h" | sed 's/@Xavier Perri/@XDPXI/g' | grep -v '^- Merge' >> release_body.md
            fi
          else
            git log -1 --pretty=%s > release_body.md
          fi

      - name: Create build prerelease
        if: steps.buildnum.outputs.is_release == 'false'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.buildnum.outputs.name }}
          tag_name: ${{ steps.buildnum.outputs.tag }}
          prerelease: true
          body_path: release_body.md

      - name: Create version release
        if: steps.buildnum.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.buildnum.outputs.name }}
          tag_name: ${{ steps.buildnum.outputs.tag }}
          prerelease: false
          body_path: release_body.md

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app (Linux)
        run: bun tauri build

      - name: Rename Linux artifacts
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          cp "$DEB" "xds-code_${VERSION}_linux-amd64.deb"
          RPM=$(find src-tauri/target/release/bundle/rpm -name "*.rpm" | head -1)
          cp "$RPM" "xds-code_${VERSION}_linux-amd64.rpm"
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$APPIMAGE" "xds-code_${VERSION}_linux-amd64.AppImage"
          zip "xds-code_${VERSION}_linux-amd64.zip" src-tauri/target/release/xds-code

      - name: Upload Linux artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            xds-code_*_linux-amd64.deb
            xds-code_*_linux-amd64.rpm
            xds-code_*_linux-amd64.AppImage
            xds-code_*_linux-amd64.zip

  build-windows:
    needs: create-release
    if: startsWith(github.event.head_commit.message, '[release]')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~\AppData\Local\bun\install\cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app (Windows)
        run: bun tauri build

      - name: Rename and package Windows artifacts
        shell: pwsh
        run: |
          $VERSION = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $MSI = (Get-ChildItem src-tauri/target/release/bundle/msi/*.msi)[0]
          Copy-Item $MSI.FullName "xds-code_${VERSION}_windows-x64.msi"
          $NSIS = (Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe)[0]
          Copy-Item $NSIS.FullName "xds-code_${VERSION}_windows-x64.exe"
          Compress-Archive -Path src-tauri/target/release/xds-code.exe -DestinationPath "xds-code_${VERSION}_windows-x64.zip"

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            xds-code_*_windows-x64.msi
            xds-code_*_windows-x64.exe
            xds-code_*_windows-x64.zip

  build-macos-intel:
    needs: create-release
    if: startsWith(github.event.head_commit.message, '[release]')
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-x86_64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-x86_64-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: bun install

      - name: Add Rust target for Intel macOS
        run: rustup target add x86_64-apple-darwin

      - name: Build Tauri app for macOS Intel (x86_64)
        run: bun tauri build --target x86_64-apple-darwin

      - name: Rename macOS Intel artifacts
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          DMG=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG" "xds-code_${VERSION}_macos-x64.dmg"
          zip "xds-code_${VERSION}_macos-x64.zip" src-tauri/target/x86_64-apple-darwin/release/xds-code

      - name: Upload macOS Intel artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            xds-code_*_macos-x64.dmg
            xds-code_*_macos-x64.zip

  build-macos-arm:
    needs: create-release
    if: startsWith(github.event.head_commit.message, '[release]')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-aarch64-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: bun install

      - name: Add Rust target for Apple Silicon macOS
        run: rustup target add aarch64-apple-darwin

      - name: Build Tauri app for macOS Apple Silicon (arm64)
        run: bun tauri build

      - name: Rename macOS ARM artifacts
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg src-tauri/target/release/bundle/dmg -name "*.dmg" 2>/dev/null | head -1)
          cp "$DMG" "xds-code_${VERSION}_macos-aarch64.dmg"
          BIN=$(find src-tauri/target/aarch64-apple-darwin/release src-tauri/target/release -maxdepth 1 -name "xds-code" -type f 2>/dev/null | head -1)
          zip "xds-code_${VERSION}_macos-aarch64.zip" "$BIN"

      - name: Upload macOS ARM artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            xds-code_*_macos-aarch64.dmg
            xds-code_*_macos-aarch64.zip

  update-homebrew-tap:
    needs: [create-release, build-macos-arm, build-macos-intel]
    if: startsWith(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo for version
        uses: actions/checkout@v7

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download macOS DMG files
        run: |
          mkdir -p /tmp/dmg
          cd /tmp/dmg
          gh release download "${{ needs.create-release.outputs.tag }}" \
            -R "${{ github.repository }}" \
            -p "xds-code_${{ steps.version.outputs.version }}_macos-*.dmg"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Calculate SHA256 hashes
        id: sha
        run: |
          ARM_SHA=$(sha256sum "/tmp/dmg/xds-code_${{ steps.version.outputs.version }}_macos-aarch64.dmg" | awk '{print $1}')
          INTEL_SHA=$(sha256sum "/tmp/dmg/xds-code_${{ steps.version.outputs.version }}_macos-x64.dmg" | awk '{print $1}')
          echo "arm_sha=$ARM_SHA" >> $GITHUB_OUTPUT
          echo "intel_sha=$INTEL_SHA" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v7
        with:
          repository: XDPXI/homebrew-tap
          token: ${{ secrets.GH_TOKEN }}
          path: homebrew-tap

      - name: Update Cask file
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          INTEL_SHA: ${{ steps.sha.outputs.intel_sha }}
        run: |
          cd "$GITHUB_WORKSPACE/homebrew-tap"
          sed -i "s/version \"[^\"]*\"/version \"$VERSION\"/" Casks/xds-code.rb
          sed -i "0,/sha256 \"[^\"]*\"/{s/sha256 \"[^\"]*\"/sha256 \"$ARM_SHA\"/;}" Casks/xds-code.rb
          sed -i "/on_intel/,/end/{s/sha256 \"[^\"]*\"/sha256 \"$INTEL_SHA\"/;}" Casks/xds-code.rb

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          path: homebrew-tap
          commit-message: "chore: update xds-code to ${{ needs.create-release.outputs.tag }}"
          title: "chore: update xds-code to ${{ needs.create-release.outputs.tag }}"
          body: |
            Updates xds-code to version ${{ needs.create-release.outputs.tag }}

            - ARM SHA256: ${{ steps.sha.outputs.arm_sha }}
            - Intel SHA256: ${{ steps.sha.outputs.intel_sha }}
          branch: update-xds-code-${{ needs.create-release.outputs.tag }}
          token: ${{ secrets.GH_TOKEN }}

  update-winget-pkgs:
    needs: [create-release, build-windows]
    if: startsWith(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo for version
        uses: actions/checkout@v7

      - name: Get version
        id: version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows MSI
        run: |
          mkdir -p /tmp/msi
          cd /tmp/msi
          gh release download "${{ needs.create-release.outputs.tag }}" \
            -R "${{ github.repository }}" \
            -p "xds-code_${{ steps.version.outputs.version }}_windows-x64.msi"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Calculate MSI SHA256
        id: sha
        run: |
          MSI_SHA=$(sha256sum "/tmp/msi/xds-code_${{ steps.version.outputs.version }}_windows-x64.msi" | awk '{print $1}')
          echo "msi_sha=$MSI_SHA" >> $GITHUB_OUTPUT

      - name: Checkout winget-pkgs
        uses: actions/checkout@v7
        with:
          repository: microsoft/winget-pkgs
          token: ${{ secrets.GH_TOKEN }}
          path: winget-pkgs

      - name: Create manifest directory and files
        run: |
          cd winget-pkgs
          VERSION="${{ steps.version.outputs.version }}"
          OLD_VERSION="0.7.5"
          MANIFEST_DIR="manifests/x/xdpxi/xds-code/${VERSION}"
          OLD_MANIFEST_DIR="manifests/x/xdpxi/xds-code/${OLD_VERSION}"

          # Create directory
          mkdir -p "$MANIFEST_DIR"

          # Copy and update installer file
          if [ -f "$OLD_MANIFEST_DIR/xdpxi.xds-code.installer.yaml" ]; then
            sed "s/${OLD_VERSION}/${VERSION}/g; s/InstallerSha256: [A-F0-9]*/InstallerSha256: ${{ steps.sha.outputs.msi_sha }}/g" \
              "$OLD_MANIFEST_DIR/xdpxi.xds-code.installer.yaml" > "$MANIFEST_DIR/xdpxi.xds-code.installer.yaml"
          fi

          # Copy and update locale file
          if [ -f "$OLD_MANIFEST_DIR/xdpxi.xds-code.locale.en-US.yaml" ]; then
            sed "s/${OLD_VERSION}/${VERSION}/g" \
              "$OLD_MANIFEST_DIR/xdpxi.xds-code.locale.en-US.yaml" > "$MANIFEST_DIR/xdpxi.xds-code.locale.en-US.yaml"
          fi

          # Copy and update version file
          if [ -f "$OLD_MANIFEST_DIR/xdpxi.xds-code.yaml" ]; then
            sed "s/${OLD_VERSION}/${VERSION}/g" \
              "$OLD_MANIFEST_DIR/xdpxi.xds-code.yaml" > "$MANIFEST_DIR/xdpxi.xds-code.yaml"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          path: winget-pkgs
          commit-message: "New version: xdpxi.xds-code version ${{ steps.version.outputs.version }}"
          title: "New version: xdpxi.xds-code version ${{ steps.version.outputs.version }}"
          body: |
            Checklist for Pull Requests
            - [x] Have you signed the [Contributor License Agreement](https://cla.opensource.microsoft.com/microsoft/winget-pkgs)?
            - [ ] Is there a linked Issue?

            Manifests
            - [x] Have you checked that there aren't other open [pull requests](https://github.com/microsoft/winget-pkgs/pulls) for the same manifest update/change?
            - [x] This PR only modifies one (1) manifest
            - [x] Have you [validated](https://github.com/microsoft/winget-pkgs/blob/master/doc/Authoring.md#validation) your manifest locally with `winget validate --manifest <path>`?
            - [x] Have you tested your manifest locally with `winget install --manifest <path>`?
            - [x] Does your manifest conform to the [1.10 schema](https://github.com/microsoft/winget-pkgs/tree/master/doc/manifest/schema/1.10.0)?
          branch: xds-code-${{ steps.version.outputs.version }}
          token: ${{ secrets.GH_TOKEN }}
